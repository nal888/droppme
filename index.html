<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>droppme — file transfer one-liner generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="https://github.com/nal888/droppme" class="github-corner" aria-label="View source on GitHub" target="_blank" rel="noopener">
        <svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true">
            <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
            <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" class="octo-arm"></path>
            <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.3,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path>
        </svg>
    </a>

    <header>
        <h1>droppme</h1>
        <p class="tagline">file transfer generate · pick · copy · run</p>
    </header>

    <main>
        <section class="card inputs">
            <div class="inputs-primary">
                <div class="input-group">
                    <label for="ip">Attacker IP</label>
                    <input type="text" id="ip" placeholder="10.10.14.46" autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="port">Port</label>
                    <input type="text" id="port" value="8000" autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="filename">Filename</label>
                    <input type="text" id="filename" value="payload.exe" autocomplete="off">
                </div>
            </div>

            <div class="inputs-secondary">
                <div class="row outdir-row">
                    <span class="row-label">Output dir</span>
                    <div class="outdir-toggle" data-active="nix">
                        <button class="toggle-chip active" data-os="nix">Linux</button>
                        <button class="toggle-chip" data-os="win">Windows</button>
                    </div>
                    <input type="text" id="outdir" placeholder="/tmp/  (Windows: C:\temp\)" autocomplete="off">
                </div>

                <div class="row server-row collapsed" id="server-row">
                    <span class="row-label">Server side</span>
                    <button class="server-toggle" id="server-toggle" type="button">
                        <span class="server-toggle-val" id="server-toggle-val">none</span>
                        <span class="server-toggle-caret">▾</span>
                    </button>
                    <div class="server-chips" id="server-chips">
                        <button class="server-chip active" data-srv="none">None</button>
                        <button class="server-chip" data-srv="srv:http">HTTP</button>
                        <button class="server-chip" data-srv="srv:http-upload">HTTP+upload</button>
                        <button class="server-chip" data-srv="srv:smb">SMB</button>
                        <button class="server-chip" data-srv="srv:ftp-write">FTP</button>
                        <button class="server-chip" data-srv="srv:webdav">WebDAV</button>
                        <button class="server-chip" data-srv="srv:nc-listen">netcat</button>
                        <button class="server-chip" data-srv="srv:tls">TLS (s_server)</button>
                        <button class="server-chip" data-srv="srv:ssh">SSH</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="filter-bar">
            <label class="select-wrap">
                <span>OS</span>
                <select id="filter-os" data-filter="os">
                    <option value="all">All</option>
                    <option value="windows">Windows</option>
                    <option value="linux">Linux</option>
                    <option value="cross">Cross</option>
                </select>
            </label>

            <label class="select-wrap">
                <span>Mode</span>
                <select id="filter-mode" data-filter="mode">
                    <option value="all">All</option>
                    <option value="download">Download</option>
                    <option value="upload">Upload</option>
                </select>
            </label>

            <label class="select-wrap">
                <span>Category</span>
                <select id="filter-category" data-filter="category">
                    <option value="all">All</option>
                    <option value="tool">Tool</option>
                    <option value="language">Language</option>
                    <option value="lolbin">LOLBIN</option>
                    <option value="service">Service</option>
                </select>
            </label>

            <label class="select-wrap">
                <span>Stealth <span class="info-dot" title="Stealth tiers describe the technique's intrinsic footprint (UA, process, command pattern) — not a guarantee against modern AV.&#10;&#10;• Stealth — uncommon binary or no-network&#10;• Medium — known LOLBIN, common UA, mitigations available&#10;• Loud — leaks PowerShell/curl UA, heavily signatured&#10;&#10;Most work for CTF/HTB labs. Real engagements: modern Defender + AMSI flags many fileless classics — test before you rely on it.">ⓘ</span></span>
                <select id="filter-stealth" data-filter="stealth">
                    <option value="all">All</option>
                    <option value="stealth">Stealth</option>
                    <option value="medium">Medium</option>
                    <option value="loud">Loud</option>
                </select>
            </label>

            <label class="filter-toggle">
                <input type="checkbox" id="filter-fileless">
                <span>Fileless only</span>
            </label>

            <input type="text" id="search" placeholder="Search techniques…" autocomplete="off">

            <span class="result-count" id="result-count"></span>
        </section>

        <section class="workspace">
            <aside class="sidebar">
                <ul id="technique-list" class="technique-list"></ul>
            </aside>

            <div class="command-pane" id="command-pane">
                <!-- selected technique rendered here -->
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
